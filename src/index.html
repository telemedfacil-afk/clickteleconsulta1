<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://meet.jit.si;
      connect-src 'self' https://meet.jit.si wss://meet.jit.si https://*.jitsi.net wss://*.jitsi.net https://*.supabase.co wss://*.supabase.co https://*.hostinger.com;
      img-src 'self' data: blob: https:;
      style-src 'self' 'unsafe-inline' https://meet.jit.si https://fonts.googleapis.com;
      font-src 'self' data: https: https://fonts.gstatic.com;
      frame-src 'self' https://meet.jit.si;
      media-src 'self' blob: https:;
      worker-src 'self' blob:;
    ">
    <link rel="icon" type="image/png" href="https://horizons-cdn.hostinger.com/678b5778-a611-4960-82cc-681a679036f7/ae0a2b0a78a757fbffb00d575d8ddf5b.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700&display=swap" rel="stylesheet">
    <title>Click Teleconsulta</title>
    
    <!-- Preloader CSS -->
    <style>
      .initial-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.2s ease-out;
      }
      
      .initial-preloader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .preloader-logo {
        height: 96px;
        width: auto;
        object-fit: contain;
        margin-bottom: 24px;
        animation: slideDown 0.5s ease-out forwards;
      }

      .preloader-bar-container {
        width: 100%;
        max-width: 420px;
        height: 4px;
        background-color: #f3f4f6;
        border-radius: 9999px;
        overflow: hidden;
        margin: 0 16px;
      }

      .preloader-bar-fill {
        height: 100%;
        background: linear-gradient(to right, #60a5fa, #2563eb);
        width: 0%;
        border-radius: 9999px;
        transition: width 0.2s ease-out;
        /* Animation will be handled by JS for better syncing, or we can use CSS keyframes as fallback */
        animation: progressFill 2s ease-out forwards;
      }

      .preloader-text {
        margin-top: 24px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 0.875rem;
        line-height: 1.25rem;
        font-weight: 500;
        color: #9ca3af;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      @keyframes progressFill {
        0% { width: 0%; }
        50% { width: 70%; }
        90% { width: 95%; }
        100% { width: 100%; } /* Fallback */
      }
    </style>
  </head>
  <body>
    <!-- Initial Preloader HTML -->
    <div id="initial-preloader" class="initial-preloader">
      <img src="https://horizons-cdn.hostinger.com/678b5778-a611-4960-82cc-681a679036f7/7054d8417c80717d153aed7ff7ebc683.png" alt="Logo" class="preloader-logo" />
      <div class="preloader-bar-container">
        <div class="preloader-bar-fill"></div>
      </div>
      <p class="preloader-text">Carregando...</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Preloader Script -->
    <script>
      window.addEventListener('load', function() {
        const preloader = document.getElementById('initial-preloader');
        if (preloader) {
          // Force progress bar to 100% immediately
          const bar = preloader.querySelector('.preloader-bar-fill');
          if (bar) bar.style.width = '100%';
          
          // Small delay to let user see 100% then fade out
          setTimeout(function() {
            preloader.classList.add('hidden');
            // Remove from DOM after transition
            setTimeout(function() {
              if (preloader.parentNode) {
                preloader.parentNode.removeChild(preloader);
              }
            }, 200);
          }, 300);
        }
      });
    </script>
  </body>
</html>
